name: Build and Push API & Worker Images to GHCR

on:
  push:
    branches:
      - main
    paths:
      - apps/api/**
      - apps/worker/**
      - packages/**
      - docker/api.Dockerfile
      - docker/worker.Dockerfile
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/build-api-worker.yml
  pull_request:
    branches:
      - main
    paths:
      - apps/api/**
      - apps/worker/**
      - packages/**
      - docker/api.Dockerfile
      - docker/worker.Dockerfile
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/build-api-worker.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/crawlix-next

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Detect changed paths
        id: changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'docker/api.Dockerfile'
            worker:
              - 'apps/worker/**'
              - 'docker/worker.Dockerfile'
            shared:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.github/workflows/build-api-worker.yml'

      - name: Build service matrix
        id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'services=["api","worker"]' >> "$GITHUB_OUTPUT"
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          api_changed='${{ steps.changes.outputs.api }}'
          worker_changed='${{ steps.changes.outputs.worker }}'
          shared_changed='${{ steps.changes.outputs.shared }}'

          services=()
          if [ "$shared_changed" = "true" ] || [ "$api_changed" = "true" ]; then
            services+=("api")
          fi
          if [ "$shared_changed" = "true" ] || [ "$worker_changed" = "true" ]; then
            services+=("worker")
          fi

          if [ ${#services[@]} -eq 0 ]; then
            echo 'services=[]' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            json="[\"${services[0]}\""
            for service in "${services[@]:1}"; do
              json+=",\"$service\""
            done
            json+="]"
            echo "services=$json" >> "$GITHUB_OUTPUT"
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/${{ matrix.service }}.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
