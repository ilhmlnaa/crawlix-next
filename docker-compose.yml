services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: crawlix-rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  redis:
    image: redis:7.4-alpine
    container_name: crawlix-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: crawlix-api
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      API_SERVICE_NAME: crawlix-api
      DASHBOARD_ORIGIN: http://localhost:3000
      SESSION_SECRET: replace-with-strong-session-secret
      SESSION_COOKIE_NAME: crawlix_session
      SESSION_TTL_SECONDS: 43200
      DASHBOARD_ADMIN_EMAIL: admin@crawlix.local
      DASHBOARD_ADMIN_PASSWORD: replace-with-strong-admin-password
      API_KEY_PREFIX: cx
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_QUEUE_NAME: crawlix.scrape.jobs
      RABBITMQ_RETRY_QUEUE_NAME: crawlix.scrape.jobs.retry
      RABBITMQ_DLQ_QUEUE_NAME: crawlix.scrape.jobs.dlq
      RABBITMQ_RETRY_DELAY_MS: 15000
      RABBITMQ_MAX_DELIVERY_ATTEMPTS: 3
      REDIS_URL: redis://redis:6379
      REDIS_JOB_PREFIX: crawlix:jobs
      RESULT_TTL_SECONDS: 3600
      SCRAPER_DEFAULT_STRATEGY: auto
      SCRAPER_TIMEOUT_MS: 30000
      SCRAPER_CACHE_TTL_SECONDS: 900
      SCRAPER_MAX_RETRIES: 2
      SCRAPER_RETRY_DELAY_MS: 1000
    ports:
      - '3001:3001'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health/ready').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: crawlix-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3002
      WORKER_SERVICE_NAME: crawlix-worker
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_QUEUE_NAME: crawlix.scrape.jobs
      RABBITMQ_RETRY_QUEUE_NAME: crawlix.scrape.jobs.retry
      RABBITMQ_DLQ_QUEUE_NAME: crawlix.scrape.jobs.dlq
      RABBITMQ_RETRY_DELAY_MS: 15000
      RABBITMQ_MAX_DELIVERY_ATTEMPTS: 3
      REDIS_URL: redis://redis:6379
      REDIS_JOB_PREFIX: crawlix:jobs
      RESULT_TTL_SECONDS: 3600
      SCRAPER_DEFAULT_STRATEGY: auto
      SCRAPER_TIMEOUT_MS: 30000
      SCRAPER_CACHE_TTL_SECONDS: 900
      SCRAPER_MAX_RETRIES: 2
      SCRAPER_RETRY_DELAY_MS: 1000

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: crawlix-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:3001/api
    ports:
      - '3000:3000'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  rabbitmq-data:
  redis-data:
