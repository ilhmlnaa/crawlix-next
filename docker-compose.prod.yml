services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT:-3001}
      API_SERVICE_NAME: ${API_SERVICE_NAME:-crawlix-api}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN}
      PUBLIC_API_RATE_LIMIT_PER_MINUTE: ${PUBLIC_API_RATE_LIMIT_PER_MINUTE:-60}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-crawlix_session}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-43200}
      DASHBOARD_ADMIN_EMAIL: ${DASHBOARD_ADMIN_EMAIL}
      DASHBOARD_ADMIN_PASSWORD: ${DASHBOARD_ADMIN_PASSWORD}
      API_KEY_PREFIX: ${API_KEY_PREFIX:-cx}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_QUEUE_NAME: ${RABBITMQ_QUEUE_NAME:-crawlix.scrape.jobs}
      RABBITMQ_RETRY_QUEUE_NAME: ${RABBITMQ_RETRY_QUEUE_NAME:-crawlix.scrape.jobs.retry}
      RABBITMQ_DLQ_QUEUE_NAME: ${RABBITMQ_DLQ_QUEUE_NAME:-crawlix.scrape.jobs.dlq}
      RABBITMQ_RETRY_DELAY_MS: ${RABBITMQ_RETRY_DELAY_MS:-15000}
      RABBITMQ_MAX_DELIVERY_ATTEMPTS: ${RABBITMQ_MAX_DELIVERY_ATTEMPTS:-3}
      REDIS_URL: ${REDIS_URL}
      REDIS_JOB_PREFIX: ${REDIS_JOB_PREFIX:-crawlix:jobs}
      RESULT_TTL_SECONDS: ${RESULT_TTL_SECONDS:-3600}
      SCRAPER_DEFAULT_STRATEGY: ${SCRAPER_DEFAULT_STRATEGY:-auto}
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS:-30000}
      SCRAPER_CACHE_TTL_SECONDS: ${SCRAPER_CACHE_TTL_SECONDS:-900}
      SCRAPER_MAX_RETRIES: ${SCRAPER_MAX_RETRIES:-2}
      SCRAPER_RETRY_DELAY_MS: ${SCRAPER_RETRY_DELAY_MS:-1000}
      SCRAPER_PROXY_URL: ${SCRAPER_PROXY_URL:-}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      PLAYWRIGHT_EXECUTABLE_PATH: ${PLAYWRIGHT_EXECUTABLE_PATH:-}
      PLAYWRIGHT_BROWSER_IDLE_TIMEOUT_MS: ${PLAYWRIGHT_BROWSER_IDLE_TIMEOUT_MS:-120000}
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.API_PORT || '3001') + '/api/health/ready').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      WORKER_PORT: ${WORKER_PORT:-3002}
      WORKER_SERVICE_NAME: ${WORKER_SERVICE_NAME:-crawlix-worker}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_QUEUE_NAME: ${RABBITMQ_QUEUE_NAME:-crawlix.scrape.jobs}
      RABBITMQ_RETRY_QUEUE_NAME: ${RABBITMQ_RETRY_QUEUE_NAME:-crawlix.scrape.jobs.retry}
      RABBITMQ_DLQ_QUEUE_NAME: ${RABBITMQ_DLQ_QUEUE_NAME:-crawlix.scrape.jobs.dlq}
      RABBITMQ_RETRY_DELAY_MS: ${RABBITMQ_RETRY_DELAY_MS:-15000}
      RABBITMQ_MAX_DELIVERY_ATTEMPTS: ${RABBITMQ_MAX_DELIVERY_ATTEMPTS:-3}
      REDIS_URL: ${REDIS_URL}
      REDIS_JOB_PREFIX: ${REDIS_JOB_PREFIX:-crawlix:jobs}
      RESULT_TTL_SECONDS: ${RESULT_TTL_SECONDS:-3600}
      SCRAPER_DEFAULT_STRATEGY: ${SCRAPER_DEFAULT_STRATEGY:-auto}
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS:-30000}
      SCRAPER_CACHE_TTL_SECONDS: ${SCRAPER_CACHE_TTL_SECONDS:-900}
      SCRAPER_MAX_RETRIES: ${SCRAPER_MAX_RETRIES:-2}
      SCRAPER_RETRY_DELAY_MS: ${SCRAPER_RETRY_DELAY_MS:-1000}
      SCRAPER_PROXY_URL: ${SCRAPER_PROXY_URL:-}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      PLAYWRIGHT_EXECUTABLE_PATH: ${PLAYWRIGHT_EXECUTABLE_PATH:-}
      PLAYWRIGHT_BROWSER_IDLE_TIMEOUT_MS: ${PLAYWRIGHT_BROWSER_IDLE_TIMEOUT_MS:-120000}

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.WORKER_PORT || '3002') + '/worker/health/ready').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      DASHBOARD_PORT: ${DASHBOARD_PORT:-3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api:3001/api}
    ports:
      - "${DASHBOARD_PORT:-3000}:${DASHBOARD_PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.DASHBOARD_PORT || '3000')).then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
